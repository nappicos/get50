<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🚀 Инклюзивное образование · Блок 1 (1–50) · Космический тест</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: radial-gradient(ellipse at 30% 40%, #010110, #000000);
        font-family: 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow-x: hidden;
    }
    .star {
        position: fixed;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: starGlow 4s infinite alternate;
        pointer-events: none;
        z-index: 0;
    }
    @keyframes starGlow {
        0% { opacity: 0.2; transform: scale(0.8); box-shadow: 0 0 2px #fff; }
        100% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 12px #ffec9e; }
    }
    .planet { position: fixed; font-size: 2.5rem; pointer-events: none; z-index: 0; filter: drop-shadow(0 0 10px cyan); }
    .earth { top: 15%; left: 5%; animation: floatEarth 20s infinite alternate; }
    .moon { bottom: 10%; right: 5%; animation: floatMoon 18s infinite alternate; }
    .mars { top: 60%; left: 85%; animation: floatMars 22s infinite alternate; }
    .rocket { position: fixed; bottom: 5%; left: 2%; font-size: 2.5rem; pointer-events: none; animation: flyRocket 20s infinite linear; z-index: 0; }
    @keyframes floatEarth { 0% { transform: translate(0,0); } 100% { transform: translate(40px,30px); } }
    @keyframes floatMoon { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,-20px); } }
    @keyframes floatMars { 0% { transform: translate(0,0); } 100% { transform: translate(50px,-30px); } }
    @keyframes flyRocket { 0% { transform: translateX(0) translateY(0); } 100% { transform: translateX(1800px) translateY(-300px); } }

    .quiz-wrapper {
        max-width: 850px;
        width: 100%;
        margin: 0 auto;
        background: rgba(3, 8, 20, 0.7);
        backdrop-filter: blur(12px);
        border-radius: 40px;
        padding: 1rem;
        border: 2px solid rgba(0, 200, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0,150,255,0.3);
        z-index: 2;
    }
    h1 { font-size: 1.6rem; background: linear-gradient(135deg,#aaddff,#3388ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.2rem; }
    .top-bar { display: flex; justify-content: space-between; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 6px; }
    .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        background: #0a1020cc;
        border-radius: 40px;
        padding: 6px 12px;
        margin-bottom: 12px;
        justify-content: center;
    }
    .stat-card {
        background: #0a1a2a;
        padding: 4px 10px;
        border-radius: 30px;
        color: #ddf4ff;
        font-size: 0.75rem;
        white-space: nowrap;
    }
    .progress-area { display: flex; gap: 8px; margin: 8px 0; align-items: center; flex-wrap: wrap; }
    .progress-bar-bg { flex:1; background: #1a2a3a; height: 16px; border-radius: 20px; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg,#44aaff,#2288cc); transition: width 0.5s; }
    .question-card { background: #0a1022ee; border-radius: 32px; padding: 16px; border: 1px solid #44aaff; }
    .question-text { font-size: 1.1rem; background: #11223c; border-radius: 32px; padding: 12px; text-align: center; margin-bottom: 14px; color: #f0fcff; }
    .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .option {
        background: #1a2a3e;
        border: 1px solid #5599dd;
        border-radius: 40px;
        padding: 8px 14px;
        cursor: pointer;
        color: #e6f7ff;
        display: flex;
        gap: 10px;
        align-items: center;
        font-size: 0.9rem;
    }
    .option.selected { background: #3a5a80; border-color: #aaffff; box-shadow: 0 0 8px cyan; }
    .opt-letter { font-weight: bold; background: #0a1a2a; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 30px; font-size: 0.85rem; }
    .feedback { background: #051020; border-radius: 32px; padding: 10px 16px; margin: 10px 0 12px; font-size: 0.95rem; font-weight: bold; text-align: center; border: 1px solid #00ffff; color: #00ffff; }
    .btn { border: none; padding: 6px 18px; border-radius: 40px; font-weight: bold; font-size: 0.9rem; cursor: pointer; color: white; margin: 4px; }
    .btn-check { background: #0066cc; box-shadow: 0 2px 0 #003366; }
    .btn-check:hover { background: #0088ff; }
    .btn-next { background: #0099cc; box-shadow: 0 2px 0 #006699; }
    .btn-next:hover { background: #00bbff; }
    .btn-restart { background: #3a2a6e; box-shadow: 0 2px 0 #1a1a4a; }
    .hidden { display: none; }
    .review { background: #0a1022ee; border-radius: 32px; padding: 16px; margin-top: 20px; }
    .mistake-item { background: #1a2a40; padding: 10px; border-radius: 28px; margin-bottom: 8px; color: #ddf4ff; font-size: 0.85rem; word-break: break-word; }
    .inspire { background: rgba(10,20,40,0.8); border-radius: 40px; padding: 8px; text-align: center; margin-bottom: 12px; border: 1px solid cyan; }
    .motivation-text { font-size: 0.85rem; font-style: italic; color: #cceeff; }
    @media (max-width: 650px) {
        .quiz-wrapper { padding: 0.8rem; }
        .question-text { font-size: 0.95rem; padding: 8px; }
        .stat-card { font-size: 0.65rem; padding: 3px 6px; white-space: normal; text-align: center; }
        .stats { gap: 4px; }
        .btn { padding: 5px 14px; font-size: 0.85rem; }
        .option { padding: 6px 10px; font-size: 0.8rem; gap: 6px; }
        .opt-letter { width: 24px; height: 24px; font-size: 0.75rem; }
        .feedback { font-size: 0.85rem; padding: 8px 12px; }
        h1 { font-size: 1.3rem; }
        .inspire { padding: 6px; }
        .motivation-text { font-size: 0.75rem; }
    }
                    </style>
</head>
<body>
<div class="planet earth">🌍</div><div class="planet moon">🌙</div><div class="planet mars">🪐</div>
<div class="rocket">🚀</div>
<script>
    for(let i=0;i<150;i++){let s=document.createElement('div');s.classList.add('star');let sz=Math.random()*3+1;s.style.width=sz+'px';s.style.height=sz+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*6+'s';document.body.appendChild(s);}

<div class="quiz-wrapper" id="quizMain">

    <div class="inspire" id="inspireBox"><span class="motivation-text">✨ Добро пожаловать в тест! ✨</span></div>
    <div id="startScreen" style="text-align:center; padding:50px 0;"><button class="btn btn-check" id="startBtn" style="font-size:2rem;">🌌 Начать тест 🚀</button></div>
    <div id="quizInterface" class="hidden">
        <div class="stats"><div class="stat-card">✅ Верно: <span id="correctCount">0</span></div><div class="stat-card">❌ Ошибки: <span id="mistakeCount">0</span></div><div class="stat-card">🎯 Точность: <span id="accuracyPercent">0</span>%</div><div class="stat-card">📝 Отвечено: <span id="answeredCount">0</span></div><div class="stat-card">🌌 Осталось: <span id="remainingCount">50</span></div></div>
        <div class="progress-area"><div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div><div class="progress-text" id="progressFraction">0/50</div></div>
        <div class="question-card"><div class="question-text" id="questionDisplay"></div><div class="options" id="optionsContainer"></div><div class="feedback" id="feedbackArea">✨ Выбери ответ → «Проверить» ✨</div><div class="button-group"><button class="btn btn-check" id="checkBtn">✅ Проверить</button><button class="btn btn-next" id="nextBtn">➡ Следующий</button></div></div>
        <div class="restart-area"><button class="btn btn-restart" id="restartBtn">🔄 Начать заново</button></div>

    </div>
</div>

        { text: "Адаптированная коррекционная программа создаётся для:", options: ["Учёта индивидуальных возможностей ребёнка", "Снижения требований", "Формального обучения", "Исключения предметов"], correct: "Учёта индивидуальных возможностей ребёнка" },

        { text: "Основным критерием оценки является:", options: ["Личный прогресс", "Средний показатель", "Формальный норматив", "Сравнение с другими"], correct: "Личный прогресс" },
        { text: "Инклюзивное образование способствует:", options: ["Социальной справедливости", "Конкуренции", "Сегрегации", "Контролю"], correct: "Социальной справедливости" },
        { text: "Главная ценность инклюзивного образования:", options: ["Человеческое достоинство", "Формальный успех", "Соревнование", "Унификация"], correct: "Человеческое достоинство" }
    ];

    let questions = [];
    let currentIndex = 0, correct = 0, wrong = 0, isAnswered = false, selectedOpt = null, mistakes = [];
    let currentQ = null;
    let intervalId = null;

    const quotesGeneral = [
        "✨ Инклюзия – это про любовь и принятие.",
        "📚 Каждый ребёнок заслуживает качественное образование.",
        "🌌 Госпитальная педагогика дарит надежду.",
        "🧠 Доступная среда – право, а не привилегия.",
        "💡 Мы все разные, и это прекрасно.",
        "🌟 Вместе мы сильнее.",
        "📖 Сегодня ты учишь, завтра – меняешь мир.",
        "🎓 Профессионализм и доброта – основа инклюзии.",
        "🚀 Знания не имеют границ.",
        "✨ Ошибка – это шаг к успеху."
    ];

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function prepareQuestions() {
        questions = questionsData.map(q => {
            let shuffledOpts = shuffleArray([...q.options]);
            return { text: q.text, options: shuffledOpts, correct: q.correct };
        });
    }

    function updateQuote() {
        let r = Math.floor(Math.random() * quotesGeneral.length);
        document.getElementById("inspireBox").innerHTML = `<span class="motivation-text">✨ ${quotesGeneral[r]} ✨</span>`;
    }
    function startQuotes() { if(intervalId) clearInterval(intervalId); updateQuote(); intervalId = setInterval(updateQuote, 10000); }

    function updateStats() {
        let answered = correct + wrong;
        document.getElementById("answeredCount").innerText = answered;
        document.getElementById("remainingCount").innerText = 50 - answered;
        let acc = answered === 0 ? 0 : Math.round((correct / answered) * 100);
        document.getElementById("accuracyPercent").innerText = acc;
        document.getElementById("correctCount").innerText = correct;
        document.getElementById("mistakeCount").innerText = wrong;
        let percent = (answered / 50) * 100;
        document.getElementById("progressFill").style.width = percent + "%";
        document.getElementById("progressFraction").innerText = `${answered}/50`;
    }

    function renderOptions() {
        if(!currentQ) return;
        let letters = ['A','B','C','D'];
        let cont = document.getElementById("optionsContainer");
        cont.innerHTML = "";
        currentQ.options.forEach((opt, idx) => {
            let div = document.createElement("div");
            div.className = "option";
            div.innerHTML = `<span class="opt-letter">${letters[idx]}</span> ${opt}`;
            div.onclick = () => {
                if(isAnswered) { document.getElementById("feedbackArea").innerHTML = "⚠️ Уже проверено. Жми «Следующий»."; return; }
                document.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
                div.classList.add("selected");
                selectedOpt = opt;
            };
            cont.appendChild(div);
        });
    }

    function loadQuestion() {
        if(currentIndex >= questions.length) {
            document.getElementById("questionDisplay").innerText = "🎉 Блок 1–50 завершён! Поздравляем! 🎉";
            document.getElementById("optionsContainer").innerHTML = "";
            document.getElementById("feedbackArea").innerHTML = "✨ Посмотрите ошибки и переходите к следующему блоку ✨";
            document.getElementById("checkBtn").disabled = true;
            document.getElementById("nextBtn").disabled = true;
            document.getElementById("reviewBlock").classList.remove("hidden");
            let mistakesDiv = document.getElementById("mistakeList");
            mistakesDiv.innerHTML = "";
            if(mistakes.length === 0) mistakesDiv.innerHTML = "<p>✨ Идеально! Вы – знаток инклюзивного образования!</p>";
            else mistakes.forEach(m => mistakesDiv.innerHTML += `<div class="mistake-item">❓ ${m.question}<br>👉 Ваш ответ: ${m.userAnswer}<br>✅ Правильно: ${m.correctAnswer}</div>`);
            return;
        }
        currentQ = questions[currentIndex];
        document.getElementById("questionDisplay").innerText = currentQ.text;
        selectedOpt = null; isAnswered = false;
        renderOptions();
        document.getElementById("feedbackArea").innerHTML = "✨ Выбери ответ → «Проверить» ✨";
        document.getElementById("checkBtn").disabled = false;
        document.getElementById("nextBtn").disabled = false;
        updateStats();
    }

    function checkAnswer() {
        if(!selectedOpt) { document.getElementById("feedbackArea").innerHTML = "⚠️ Выбери вариант!"; return; }
        if(isAnswered) return;
        if(selectedOpt === currentQ.correct) {
            document.getElementById("feedbackArea").innerHTML = `✅ Верно! «${selectedOpt}» — отлично!`;
            correct++;
        } else {
            document.getElementById("feedbackArea").innerHTML = `❌ Неверно. Правильный ответ: «${currentQ.correct}».`;
            wrong++;
            mistakes.push({ question: currentQ.text, userAnswer: selectedOpt, correctAnswer: currentQ.correct });
        }
        isAnswered = true;
        updateStats();
    }

    function nextQuestion() {
        if(!isAnswered) { document.getElementById("feedbackArea").innerHTML = "⚠️ Сначала проверь ответ."; return; }
        currentIndex++;
        loadQuestion();
    }

    function restart() {
        prepareQuestions();
        currentIndex = 0; correct = 0; wrong = 0; mistakes = []; isAnswered = false; selectedOpt = null;
        document.getElementById("reviewBlock").classList.add("hidden");
        loadQuestion();
        updateStats();
    }

    function startQuiz() {
        prepareQuestions();
        document.getElementById("startScreen").classList.add("hidden");
        document.getElementById("quizInterface").classList.remove("hidden");
        startQuotes();
        restart();
    }

    document.getElementById("startBtn").onclick = startQuiz;
    document.getElementById("checkBtn").onclick = checkAnswer;
    document.getElementById("nextBtn").onclick = nextQuestion;
    document.getElementById("restartBtn").onclick = restart;
    document.getElementById("restartReviewBtn").onclick = restart;
</script>
</body>
</html>
