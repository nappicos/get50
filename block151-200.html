        .quiz-wrapper {
            max-width: 1000px; width: 100%; margin: 0 auto;
            background: rgba(3, 8, 20, 0.7); backdrop-filter: blur(12px);
            border-radius: 70px; padding: 1.8rem 2rem;
            border: 2px solid rgba(0, 200, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0,150,255,0.4);

        }
        h1 { font-size: 2rem; background: linear-gradient(135deg,#aaddff,#3388ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; }
        .stats { display: flex; gap: 12px; background: #0a1020cc; border-radius: 70px; padding: 10px 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #0a1a2a; padding: 7px 18px; border-radius: 40px; color: #ddf4ff; }
        .progress-area { display: flex; gap: 18px; margin: 15px 0; align-items: center; flex-wrap: wrap; }
        .progress-bar-bg { flex:1; background: #1a2a3a; height: 28px; border-radius: 60px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg,#44aaff,#2288cc); transition: width 0.5s; }

        .option { background: #1a2a3e; border: 1px solid #5599dd; border-radius: 80px; padding: 12px 24px; cursor: pointer; color: #e6f7ff; display: flex; gap: 18px; align-items: center; }
        .option.selected { background: #3a5a80; border-color: #aaffff; box-shadow: 0 0 12px cyan; }
        .opt-letter { font-weight: bold; background: #0a1a2a; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 60px; }
        .feedback { background: #051020; border-radius: 56px; padding: 16px 28px; margin: 15px 0 20px; font-size: 1.2rem; font-weight: bold; text-align: center; border: 1px solid #00ffff; color: #00ffff; text-shadow: 0 0 8px #00ffff, 0 0 12px #0088ff; box-shadow: 0 0 15px rgba(0,255,255,0.3); }
        .btn { border: none; padding: 12px 34px; border-radius: 60px; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; margin: 5px; }
        .btn-check { background: #0066cc; box-shadow: 0 0 12px #00aaff, 0 4px 0 #003366; }
        .btn-check:hover { background: #0088ff; box-shadow: 0 0 20px #00aaff; }
        .btn-next { background: #0099cc; box-shadow: 0 0 12px #00ffff, 0 4px 0 #006699; }
        .btn-next:hover { background: #00bbff; box-shadow: 0 0 20px #00ffff; }
        .btn-restart { background: #3a2a6e; box-shadow: 0 4px 0 #1a1a4a; }
        .hidden { display: none; }
        .review { background: #0a1022ee; border-radius: 52px; padding: 28px; margin-top: 30px; }
        .mistake-item { background: #1a2a40; padding: 12px; border-radius: 40px; margin-bottom: 10px; color: #ddf4ff; }
        .inspire { background: rgba(10,20,40,0.8); border-radius: 60px; padding: 14px; text-align: center; margin-bottom: 20px; border: 1px solid cyan; }
        .motivation-text { font-size: 1rem; font-style: italic; color: #cceeff; }
        @media (max-width: 768px) { .quiz-wrapper { padding: 1rem; } .question-text { font-size: 1.2rem; } }
    </style>
</head>

    for(let i=0;i<150;i++){let s=document.createElement('div');s.classList.add('star');let sz=Math.random()*3+1;s.style.width=sz+'px';s.style.height=sz+'px';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*6+'s';document.body.appendChild(s);}

<script>
    const questionsData = [

        { text: "Эффективность инклюзии зависит от:", options: ["Подготовки педагогов", "Формализма", "Контроля", "Изоляции"], correct: "Подготовки педагогов" },
        { text: "Государственная поддержка инклюзии направлена на:", options: ["Создание условий для обучения", "Контроль", "Сегрегацию", "Формализм"], correct: "Создание условий для обучения" },
        { text: "Инклюзивное образование является частью нашей:", options: ["Социальной политики", "Контрольной системы", "Формализма", "Конкуренции"], correct: "Социальной политики" },
        { text: "Образование детей с ОВЗ --- это:", options: ["Реализация прав человека", "Формальность", "Нагрузка", "Исключение"], correct: "Реализация прав человека" },
        { text: "Госпитальный педагог должен обеспечивать:", options: ["Поддержку образовательного процесса", "Контроль", "Формализм", "Изоляцию"], correct: "Поддержку образовательного процесса" },
        { text: "Основная задача госпитального обучения:", options: ["Сохранение образовательной траектории", "Контроль", "Администрирование", "Формализм"], correct: "Сохранение образовательной траектории" },
        { text: "Обучение в стационаре должно быть:", options: ["Гибким и адаптивным", "Строгим", "Стандартным", "Формальным"], correct: "Гибким и адаптивным" },
        { text: "Госпитальный педагог взаимодействует с семьёй для:", options: ["Поддержки ребёнка", "Контроля", "Формальных отчётов", "Изоляции"], correct: "Поддержки ребёнка" },
        { text: "Медико-реабилитационная диагностика необходима для:", options: ["Оптимизации образовательной нагрузки", "Контроля", "Исключения", "Формализма"], correct: "Оптимизации образовательной нагрузки" },

        { text: "Комплексный подход обеспечивает:", options: ["Целостную поддержку ребёнка", "Формализм", "Разобщённость", "Контроль"], correct: "Целостную поддержку ребёнка" },
        { text: "Методологический принцип госпитальной педагогики:", options: ["Гуманизация образования", "Авторитаризм", "Контроль", "Унификация"], correct: "Гуманизация образования" },
        { text: "Творческий подход в обучении инклюзии способствует:", options: ["Снижению эмоционального напряжения", "Утомлению", "Формализму", "Отказу от обучения"], correct: "Снижению эмоционального напряжения" },
        { text: "Использование творчества в обучении направлено на:", options: ["Поддержку мотивации", "Контроль", "Унификацию", "Формальный результат"], correct: "Поддержку мотивации" },
        { text: "Современная концепция здоровья рассматривает здоровье как:", options: ["Состояние благополучия", "Отсутствие болезни", "Диагноз", "Контроль"], correct: "Состояние благополучия" },
        { text: "Факторы, влияющие на здоровье детей:", options: ["Образ жизни и условия обучения", "Только наследственность", "Учебники", "Дисциплина"], correct: "Образ жизни и условия обучения" },
        { text: "Здоровьесберегающая деятельность направлена на:", options: ["Профилактику заболеваний", "Повышение нагрузки", "Контроль", "Формализм"], correct: "Профилактику заболеваний" },
        { text: "Рациональная организация учебного процесса предполагает:", options: ["Чередование труда и отдыха", "Максимальную нагрузку", "Формализм", "Контроль"], correct: "Чередование труда и отдыха" },
        { text: "Обучение в «Мехрли Мактаб» осуществляется:", options: ["С учётом медицинских показаний", "По стандартной программе", "Формально", "Без адаптации"], correct: "С учётом медицинских показаний" },
        { text: "Учитель госпитальной школы должен быть готов к:", options: ["Индивидуальной работе", "Только фронтальному обучению", "Контролю", "Администрированию"], correct: "Индивидуальной работе" },
        { text: "Формирование педагогических компетенций осуществляется через:", options: ["Повышение квалификации", "Формальные отчёты", "Контроль", "Случайный опыт"], correct: "Повышение квалификации" },
        { text: "Медико-педагогическая комиссия рекомендует:", options: ["Оптимальные условия обучения", "Контроль", "Изоляцию", "Формализм"], correct: "Оптимальные условия обучения" },
        { text: "Адаптированная образовательная программа предназначена для:", options: ["Обучающихся с ОВЗ", "Одарённых детей", "Всех учащихся", "Воспитателей"], correct: "Обучающихся с ОВЗ" },
        { text: "Взаимодействие специалистов в инклюзии называется:", options: ["Междисциплинарный подход", "Изоляция", "Конкуренция", "Подчинение"], correct: "Междисциплинарный подход" },
        { text: "Оценивание в инклюзивном обучении должно быть:", options: ["Гибким", "Жёстким", "Формальным", "Карательным"], correct: "Гибким" },
        { text: "Критерием успешности обучения является:", options: ["Достижение личного прогресса", "Средний балл", "Формальный норматив", "Сравнение"], correct: "Достижение личного прогресса" },
        { text: "Инклюзивное обучение способствует развитию:", options: ["Социальных навыков", "Изоляции", "Формализма", "Контроля"], correct: "Социальных навыков" },
        { text: "Основной документ, регулирующий инклюзивное образование:", options: ["Конвенция ООН о правах инвалидов", "Трудовой кодекс", "Гражданский кодекс", "Медицинский протокол"], correct: "Конвенция ООН о правах инвалидов" },
        { text: "Эффективная инклюзия возможна при:", options: ["Позитивном отношении общества", "Формализме", "Контроле", "Изоляции"], correct: "Позитивном отношении общества" },
        { text: "Образование детей с ОВЗ направлено на:", options: ["Социальную интеграцию", "Формальный результат", "Контроль", "Унификацию"], correct: "Социальную интеграцию" },
        { text: "Основной результат инклюзивного образования:", options: ["Полноценное участие в обществе", "Формальный аттестат", "Контроль", "Сравнение"], correct: "Полноценное участие в обществе" },
        { text: "Госпитальная педагогика в больницах ориентирована на:", options: ["Потребности ребёнка", "Стандарты", "Контроль", "Формализм"], correct: "Потребности ребёнка" },
        { text: "Ценность госпитального образования заключается в:", options: ["Поддержке ребёнка в период лечения", "Формализме", "Контроле", "Унификации"], correct: "Поддержке ребёнка в период лечения" },
        { text: "Госпитальная школа создаётся при:", options: ["Медицинском учреждении", "Университете", "Детском саду", "Интернате"], correct: "Медицинском учреждении" },
        { text: "Педагог в инклюзивной среде выступает как:", options: ["Партнёр ребёнка", "Контролёр", "Администратор", "Наблюдатель"], correct: "Партнёр ребёнка" },
        { text: "Образовательная среда детей ОВЗ должна быть:", options: ["Безопасной и поддерживающей", "Жёсткой", "Формальной", "Закрытой"], correct: "Безопасной и поддерживающей" },
        { text: "Основной метод обучения в госпитальной педагогике:", options: ["Индивидуальный подход", "Фронтальный метод", "Контрольный метод", "Лекционный метод"], correct: "Индивидуальный подход" },
        { text: "Успешная инклюзия требует:", options: ["Системного подхода", "Формализма", "Контроля", "Изоляции"], correct: "Системного подхода" },
        { text: "Инклюзивная школа реализует:", options: ["Принципы равенства", "Отбор", "Контроль", "Сегрегацию"], correct: "Принципы равенства" },
        { text: "Образование детей с инвалидностью является:", options: ["Социальной необходимостью", "Формальностью", "Нагрузкой", "Исключением"], correct: "Социальной необходимостью" },
        { text: "Роль государства в инклюзивном образовании заключается в:", options: ["Создании условий", "Контроле", "Формализме", "Сегрегации"], correct: "Создании условий" },
        { text: "Госпитальная педагогика учитывает", options: ["Физическое и эмоциональное состояние ребенка", "Только возраст", "Только учебный план", "Только оценки"], correct: "Физическое и эмоциональное состояние ребенка" },
        { text: "Инклюзивное образование предполагает уважение к:", options: ["Индивидуальным особенностям ребёнка", "Единым стандартам", "Формальным требованиям", "Сравнению"], correct: "Индивидуальным особенностям ребёнка" },
        { text: "Основной принцип инклюзивного обучения:", options: ["Доступность образования", "Отбор", "Изоляция", "Сегрегация"], correct: "Доступность образования" }
    ];

    let questions = [];
    let currentIndex = 0, correct = 0, wrong = 0, isAnswered = false, selectedOpt = null, mistakes = [];
    let currentQ = null;
    let intervalId = null;

    const quotesGeneral = [
        "✨ Инклюзия – это про любовь и принятие.",
        "📚 Каждый ребёнок заслуживает качественное образование.",
        "🌌 Госпитальная педагогика дарит надежду.",
        "🧠 Доступная среда – право, а не привилегия.",
        "💡 Мы все разные, и это прекрасно.",
        "🌟 Вместе мы сильнее.",
        "📖 Сегодня ты учишь, завтра – меняешь мир.",
        "🎓 Профессионализм и доброта – основа инклюзии.",
        "🚀 Знания не имеют границ.",
        "✨ Ошибка – это шаг к успеху."
    ];

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function prepareQuestions() {
        questions = questionsData.map(q => {
            let shuffledOpts = shuffleArray([...q.options]);
            return { text: q.text, options: shuffledOpts, correct: q.correct };
        });
    }

    function updateQuote() {
        let r = Math.floor(Math.random() * quotesGeneral.length);
        document.getElementById("inspireBox").innerHTML = `<span class="motivation-text">✨ ${quotesGeneral[r]} ✨</span>`;
    }
    function startQuotes() { if(intervalId) clearInterval(intervalId); updateQuote(); intervalId = setInterval(updateQuote, 10000); }

    function updateStats() {
        let answered = correct + wrong;
        document.getElementById("answeredCount").innerText = answered;
        document.getElementById("remainingCount").innerText = 50 - answered;
        let acc = answered === 0 ? 0 : Math.round((correct / answered) * 100);
        document.getElementById("accuracyPercent").innerText = acc;
        document.getElementById("correctCount").innerText = correct;
        document.getElementById("mistakeCount").innerText = wrong;
        let percent = (answered / 50) * 100;
        document.getElementById("progressFill").style.width = percent + "%";
        document.getElementById("progressFraction").innerText = `${answered}/50`;
    }

    function renderOptions() {
        if(!currentQ) return;
        let letters = ['A','B','C','D'];
        let cont = document.getElementById("optionsContainer");
        cont.innerHTML = "";
        currentQ.options.forEach((opt, idx) => {
            let div = document.createElement("div");
            div.className = "option";
            div.innerHTML = `<span class="opt-letter">${letters[idx]}</span> ${opt}`;
            div.onclick = () => {
                if(isAnswered) { document.getElementById("feedbackArea").innerHTML = "⚠️ Уже проверено. Жми «Следующий»."; return; }
                document.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
                div.classList.add("selected");
                selectedOpt = opt;
            };
            cont.appendChild(div);
        });
    }

    function loadQuestion() {
        if(currentIndex >= questions.length) {
            document.getElementById("questionDisplay").innerText = "🎉 Блок 151–200 завершён! Поздравляем! 🎉";
            document.getElementById("optionsContainer").innerHTML = "";
            document.getElementById("feedbackArea").innerHTML = "✨ Посмотрите ошибки и переходите к следующему блоку ✨";
            document.getElementById("checkBtn").disabled = true;
            document.getElementById("nextBtn").disabled = true;
            document.getElementById("reviewBlock").classList.remove("hidden");
            let mistakesDiv = document.getElementById("mistakeList");
            mistakesDiv.innerHTML = "";
            if(mistakes.length === 0) mistakesDiv.innerHTML = "<p>✨ Идеально! Вы – знаток инклюзивного образования!</p>";
            else mistakes.forEach(m => mistakesDiv.innerHTML += `<div class="mistake-item">❓ ${m.question}<br>👉 Ваш ответ: ${m.userAnswer}<br>✅ Правильно: ${m.correctAnswer}</div>`);
            return;
        }
        currentQ = questions[currentIndex];
        document.getElementById("questionDisplay").innerText = currentQ.text;
        selectedOpt = null; isAnswered = false;
        renderOptions();
        document.getElementById("feedbackArea").innerHTML = "✨ Выбери ответ → «Проверить» ✨";
        document.getElementById("checkBtn").disabled = false;
        document.getElementById("nextBtn").disabled = false;
        updateStats();
    }

    function checkAnswer() {
        if(!selectedOpt) { document.getElementById("feedbackArea").innerHTML = "⚠️ Выбери вариант!"; return; }
        if(isAnswered) return;
        if(selectedOpt === currentQ.correct) {
            document.getElementById("feedbackArea").innerHTML = `✅ Верно! «${selectedOpt}» — отлично!`;
            correct++;
        } else {
            document.getElementById("feedbackArea").innerHTML = `❌ Неверно. Правильный ответ: «${currentQ.correct}».`;
            wrong++;
            mistakes.push({ question: currentQ.text, userAnswer: selectedOpt, correctAnswer: currentQ.correct });
        }
        isAnswered = true;
        updateStats();
    }

    function nextQuestion() {
        if(!isAnswered) { document.getElementById("feedbackArea").innerHTML = "⚠️ Сначала проверь ответ."; return; }
        currentIndex++;
        loadQuestion();
    }

    function restart() {
        prepareQuestions();
        currentIndex = 0; correct = 0; wrong = 0; mistakes = []; isAnswered = false; selectedOpt = null;
        document.getElementById("reviewBlock").classList.add("hidden");
        loadQuestion();
        updateStats();
    }

    function startQuiz() {
        prepareQuestions();
        document.getElementById("startScreen").classList.add("hidden");
        document.getElementById("quizInterface").classList.remove("hidden");
        startQuotes();
        restart();
    }

    document.getElementById("startBtn").onclick = startQuiz;
    document.getElementById("checkBtn").onclick = checkAnswer;
    document.getElementById("nextBtn").onclick = nextQuestion;
    document.getElementById("restartBtn").onclick = restart;
    document.getElementById("restartReviewBtn").onclick = restart;
</script>
</body>
</html>
