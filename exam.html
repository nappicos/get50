        { text: "Поддержка семьи ребёнка включает:", options: ["Педагогическое консультирование", "Контроль", "Формализм", "Исключение родителей"], correct: "Педагогическое консультирование" },
        { text: "Инклюзивное образование формирует у детей:", options: ["Навыки принятия различий", "Соперничество", "Формализм", "Изоляцию"], correct: "Навыки принятия различий" },
        { text: "Основная задача олигофренопедагога:", options: ["Коррекционно-развивающая помощь", "Контроль дисциплины", "Администрирование", "Формальный надзор"], correct: "Коррекционно-развивающая помощь" },
        { text: "Решения ПМПК направлены на:", options: ["Оптимизацию образовательного маршрута", "Ограничение прав", "Формализм", "Контроль"], correct: "Оптимизацию образовательного маршрута" },
        { text: "Адаптация учебных помещений предполагает:", options: ["Создание безбарьерной среды", "Минимальные изменения", "Формализм", "Контроль"], correct: "Создание безбарьерной среды" },
        { text: "Инклюзивное образование способствует развитию:", options: ["Социальной ответственности", "Конкуренции", "Изоляции", "Формализма"], correct: "Социальной ответственности" },
        { text: "Профориентация детей с ОВЗ должна учитывать:", options: ["Индивидуальные возможности", "Рынок моды", "Мнение сверстников", "Случайный выбор"], correct: "Индивидуальные возможности" },
        { text: "Выбор профессии зависит от:", options: ["Интересов и способностей", "Случая", "Давления", "Сравнения"], correct: "Интересов и способностей" },
        { text: "Социальная интеграция означает:", options: ["Активное участие в жизни общества", "Формальное присутствие", "Изоляцию", "Отчуждение"], correct: "Активное участие в жизни общества" },
        { text: "Инклюзивная культура школы формируется через:", options: ["Ценности уважения", "Контроль", "Формализм", "Разделение"], correct: "Ценности уважения" },
        { text: "Подготовка педагогов к инклюзии включает:", options: ["Развитие профессиональных компетенций", "Формальные курсы", "Контроль", "Унификацию"], correct: "Развитие профессиональных компетенций" },
        { text: "Госпитальная образования относится к области:", options: ["Специальной педагогики", "Административного управления", "Медицинского контроля", "Социального надзора"], correct: "Специальной педагогики" },
        { text: "Основной принцип обучения детей с ОВЗ:", options: ["Индивидуализация", "Усреднение", "Контроль", "Формализм"], correct: "Индивидуализация" },
        { text: "Эффективное взаимодействие специалистов основывается на:", options: ["Сотрудничестве", "Подчинении", "Контроле", "Формализме"], correct: "Сотрудничестве" },
        { text: "Ребёнок в инклюзивной среде должен чувствовать:", options: ["Принятие и поддержку", "Сравнение", "Контроль", "Изоляцию"], correct: "Принятие и поддержку" },
        { text: "Основная цель работы с детьми-инвалидами в инклюзии:", options: ["Максимальная социализация", "Формальный результат", "Контроль", "Сравнение"], correct: "Максимальная социализация" },
        { text: "Педагогическая поддержка направлена на:", options: ["Развитие личности ребёнка", "Контроль", "Формализм", "Соревнование"], correct: "Развитие личности ребёнка" },
        { text: "Инклюзивный процесс строится на основе:", options: ["Партнёрства", "Авторитаризма", "Контроля", "Изоляции"], correct: "Партнёрства" },
        { text: "Образование в условиях болезни помогает:", options: ["Сохранить жизненные перспективы", "Увеличить стресс", "Изолироваться", "Отказаться от учёбы"], correct: "Сохранить жизненные перспективы" },
        { text: "Главная ценность госпитальной педагогики:", options: ["Ребёнок и его развитие", "Контроль", "Формализм", "Результат"], correct: "Ребёнок и его развитие" },
        { text: "Инклюзивная школа ориентирована классы на:", options: ["Развитие каждого ученика", "Средний уровень", "Контроль", "Отбор"], correct: "Развитие каждого ученика" },
        { text: "Качество инклюзивного образования определяется:", options: ["Личностными и социальными результатами", "Формальными показателями", "Контролем", "Сравнением"], correct: "Личностными и социальными результатами" },
        { text: "Госпитальная педагогика требует от учителя:", options: ["Гибкости и эмпатии", "Строгости", "Контроля", "Формализма"], correct: "Гибкости и эмпатии" }
    ];

    // ---------- КОНФИГУРАЦИЯ ЭКЗАМЕНА ----------
    const EXAM_QUESTIONS_COUNT = 25;

    let currentQuestions = [];
    let currentIndex = 0, correct = 0, wrong = 0, isAnswered = false, selectedOpt = null, mistakes = [];
    let currentQ = null;
    let intervalId = null;

    const quotesGeneral = [
        "✨ Инклюзия – это про любовь и принятие.",
        "📚 Каждый ребёнок заслуживает качественное образование.",
        "🌌 Госпитальная педагогика дарит надежду.",
        "🧠 Доступная среда – право, а не привилегия.",
        "💡 Мы все разные, и это прекрасно.",
        "🌟 Вместе мы сильнее.",
        "📖 Сегодня ты учишь, завтра – меняешь мир.",
        "🎓 Профессионализм и доброта – основа инклюзии.",
        "🚀 Знания не имеют границ.",
        "✨ Ошибка – это шаг к успеху."
    ];

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getRandomQuestions(questionBank, num) {
        const shuffled = shuffleArray([...questionBank]);
        return shuffled.slice(0, num);
    }

    function prepareExamQuestions() {
        return getRandomQuestions(fullQuestionsBank, EXAM_QUESTIONS_COUNT).map(q => {
            let shuffledOpts = shuffleArray([...q.options]);
            return { text: q.text, options: shuffledOpts, correct: q.correct };
        });
    }

    let quizActive = false;

    function updateQuote() {
        let r = Math.floor(Math.random() * quotesGeneral.length);
        document.getElementById("inspireBox").innerHTML = `<span class="motivation-text">✨ ${quotesGeneral[r]} ✨</span>`;
    }
    function startQuotes() { if(intervalId) clearInterval(intervalId); updateQuote(); intervalId = setInterval(updateQuote, 10000); }

    function updateStats() {
        let answered = correct + wrong;
        document.getElementById("answeredCount").innerText = answered;
        document.getElementById("remainingCount").innerText = EXAM_QUESTIONS_COUNT - answered;
        let acc = answered === 0 ? 0 : Math.round((correct / answered) * 100);
        document.getElementById("accuracyPercent").innerText = acc;
        document.getElementById("correctCount").innerText = correct;
        document.getElementById("mistakeCount").innerText = wrong;
        let percent = (answered / EXAM_QUESTIONS_COUNT) * 100;
        document.getElementById("progressFill").style.width = percent + "%";
        document.getElementById("progressFraction").innerText = `${answered}/${EXAM_QUESTIONS_COUNT}`;
    }

    function renderOptions() {
        if(!currentQ) return;
        let letters = ['A','B','C','D'];
        let cont = document.getElementById("optionsContainer");
        cont.innerHTML = "";
        currentQ.options.forEach((opt, idx) => {
            let div = document.createElement("div");
            div.className = "option";
            div.innerHTML = `<span class="opt-letter">${letters[idx]}</span> ${opt}`;
            div.onclick = () => {
                if(isAnswered) { document.getElementById("feedbackArea").innerHTML = "⚠️ Уже проверено. Жми «Следующий»."; return; }
                document.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
                div.classList.add("selected");
                selectedOpt = opt;
            };
            cont.appendChild(div);
        });
    }

    function loadQuestion() {
        if(currentIndex >= currentQuestions.length) {
            document.getElementById("questionDisplay").innerText = "🎉 Экзамен завершён! Поздравляем! 🎉";
            document.getElementById("optionsContainer").innerHTML = "";
            document.getElementById("feedbackArea").innerHTML = "✨ Посмотрите ошибки и начните новый экзамен ✨";
            document.getElementById("checkBtn").disabled = true;
            document.getElementById("nextBtn").disabled = true;
            document.getElementById("reviewBlock").classList.remove("hidden");
            let mistakesDiv = document.getElementById("mistakeList");
            mistakesDiv.innerHTML = "";
            if(mistakes.length === 0) mistakesDiv.innerHTML = "<p>✨ Идеально! Вы – знаток инклюзивного образования!</p>";
            else mistakes.forEach(m => mistakesDiv.innerHTML += `<div class="mistake-item">❓ ${m.question}<br>👉 Ваш ответ: ${m.userAnswer}<br>✅ Правильно: ${m.correctAnswer}</div>`);
            return;
        }
        currentQ = currentQuestions[currentIndex];
        document.getElementById("questionDisplay").innerText = currentQ.text;
        selectedOpt = null; isAnswered = false;
        renderOptions();
        document.getElementById("feedbackArea").innerHTML = "✨ Выбери ответ → «Проверить» ✨";
        document.getElementById("checkBtn").disabled = false;
        document.getElementById("nextBtn").disabled = false;
        updateStats();
    }

    function checkAnswer() {
        if(!selectedOpt) { document.getElementById("feedbackArea").innerHTML = "⚠️ Выбери вариант!"; return; }
        if(isAnswered) return;
        if(selectedOpt === currentQ.correct) {
            document.getElementById("feedbackArea").innerHTML = `✅ Верно! «${selectedOpt}» — отлично!`;
            correct++;
        } else {
            document.getElementById("feedbackArea").innerHTML = `❌ Неверно. Правильный ответ: «${currentQ.correct}».`;
            wrong++;
            mistakes.push({ question: currentQ.text, userAnswer: selectedOpt, correctAnswer: currentQ.correct });
        }
        isAnswered = true;
        updateStats();
    }

    function nextQuestion() {
        if(!isAnswered) { document.getElementById("feedbackArea").innerHTML = "⚠️ Сначала проверь ответ."; return; }
        currentIndex++;
        loadQuestion();
    }

    function restartExam() {
        currentQuestions = prepareExamQuestions();
        currentIndex = 0; correct = 0; wrong = 0; mistakes = []; isAnswered = false; selectedOpt = null;
        document.getElementById("reviewBlock").classList.add("hidden");
        quizActive = true;
        loadQuestion();
        updateStats();
    }

    function startQuiz() {
        startQuotes();
        document.getElementById("startScreen").classList.add("hidden");
        document.getElementById("quizInterface").classList.remove("hidden");
        restartExam();
    }

    document.getElementById("startBtn").onclick = startQuiz;
    document.getElementById("checkBtn").onclick = checkAnswer;
    document.getElementById("nextBtn").onclick = nextQuestion;
    document.getElementById("restartBtn").onclick = () => { restartExam(); };
    document.getElementById("restartReviewBtn").onclick = () => { restartExam(); };
</script>
